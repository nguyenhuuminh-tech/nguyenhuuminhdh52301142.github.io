<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Dashboard quản lý sân</title>
<link rel="stylesheet" href="style.css">

<style>
body {
    font-family: Arial;
    padding: 20px;
    background: #f5f5f5;
}

input {
    margin: 5px;
    padding: 8px;
}

button {
    margin: 5px;
    padding: 8px 12px;
    cursor: pointer;
}

.card {
    width: 250px;
    background: white;
    margin: 10px;
    padding: 10px;
    border-radius: 10px;
    display: inline-block;
    box-shadow: 0 0 10px rgba(0,0,0,0.2);
}

.card img {
    width: 100%;
    height: 150px;
    object-fit: cover;
    border-radius: 10px;
}
</style>

</head>

<body>

<h2>⚙️ Quản lý sân bóng</h2>

<!-- FORM -->
<input id="ten" placeholder="Tên sân">
<input id="khuvuc" placeholder="Khu vực">
<input id="gia" placeholder="Giá ">
<input id="hinh" placeholder="Tên ảnh">

<br>

<button onclick="them()">➕ Thêm sân</button>
<button onclick="them6san()">Chọn Nhanh</button>

<hr>

<!-- DANH SÁCH -->
<div id="danhsach"></div>

<script>
let ds = JSON.parse(localStorage.getItem("san")) || [];

// HIỂN THỊ
function hien() {
    let html = "";

    ds.forEach((s, i) => {
        html += `
        <div class="card">
            <img src="images/${s.hinh}">
            <h3>${s.ten}</h3>
            <p>📍 ${s.khuvuc}</p>
            <p>💰 ${Number(s.gia).toLocaleString()} VND</p>
            <button onclick="xoa(${i})">❌ Xóa</button>
        </div>
        `;
    });

    document.getElementById("danhsach").innerHTML = html;
}

// THÊM
function them() {
    let san = {
        ten: document.getElementById("ten").value,
        khuvuc: document.getElementById("khuvuc").value,
        gia: document.getElementById("gia").value,
        hinh: document.getElementById("hinh").value
    };

    ds.push(san);
    localStorage.setItem("san", JSON.stringify(ds));
    hien();
}

// XÓA
function xoa(i) {
    ds.splice(i, 1);
    localStorage.setItem("san", JSON.stringify(ds));
    hien();
}

// TẠO 6 SÂN MẪU
function them6san() {
    ds = [
        {ten:"Sân A", khuvuc:"Thủ Đức", gia:300000, hinh:"san1.webp"},
        {ten:"Sân B", khuvuc:"Quận 9", gia:250000, hinh:"san2.jpg"},
        {ten:"Sân C", khuvuc:"Quận 2", gia:280000, hinh:"san3.jpg"},
        {ten:"Sân D", khuvuc:"Bình Thạnh", gia:320000, hinh:"san4.jpg"},
        {ten:"Sân E", khuvuc:"Gò Vấp", gia:270000, hinh:"san5.jpg"},
        {ten:"Sân F", khuvuc:"Phú Nhuận", gia:290000, hinh:"san6.webp"}
    ];

    localStorage.setItem("san", JSON.stringify(ds));
    hien();
}

// LOAD BAN ĐẦU
hien();
</script>

</body>
</html>
